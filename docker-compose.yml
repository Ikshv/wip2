# Services are independent: no depends_on. Start only what you need, e.g.:
#   docker compose up -d piper-ui
#   docker compose stop mara-tts
# Stopping one service does not stop the others.

services:
  mara-tts:
    build:
      context: ./tts_service
      dockerfile: Dockerfile
    ports:
      - "10200:10200"
    volumes:
      - piper_models:/data/models
    environment:
      MODELS_DIR: /data/models
      WYOMING_HOST: "0.0.0.0"
      WYOMING_PORT: "10200"
      # Short name matching discover_voices (first segment of en_US-name-quality.onnx)
      PIPER_VOICE: ${PIPER_VOICE:-patrick}
    restart: unless-stopped

  mara-wakeword:
    build:
      context: ./wakeword_service
      dockerfile: Dockerfile
    ports:
      - "10300:10300"
    volumes:
      - wakeword_models:/data/wakeword_models
      - mara_logs:/data/logs
    environment:
      WAKE_MODELS_DIR: /data/wakeword_models
      WAKE_LOG_FILE: /data/logs/mara-wakeword.log
      WAKE_WORDS: ${WAKE_WORDS:-patrick}
      # Default: openWakeWord ONNX (patrick.onnx + bundled melspec/embedding). Set whisper to fall back.
      WAKE_DETECTION_METHOD: ${WAKE_DETECTION_METHOD:-openwakeword}
      # Lower = easier to trigger (more false positives). Try 0.15–0.25 for custom models.
      WAKE_THRESHOLD: ${WAKE_THRESHOLD:-0.2}
      # After a hit, scores must fall below this before another (default ~max(0.08, 0.35×threshold)).
      # WAKE_REARM_MAX_SCORE: "0.1"
      WHISPER_MODEL: ${WHISPER_MODEL:-base.en}
      # Set to 1 to log Whisper text every detection pass (noisy)
      WAKE_DEBUG_WHISPER: ${WAKE_DEBUG_WHISPER:-0}
      # Set to 1 to log openWakeWord scores (see if patrick rises when you speak)
      WAKE_DEBUG_OWW: ${WAKE_DEBUG_OWW:-0}
      # mDNS A records: advertise this IP so Wyoming discovery points at a routable host (Tailscale).
      # Override in .env if your IP changes. Use LAN IP instead if HA is only on local Wi‑Fi.
      WYOMING_ZEROCONF_IPS: ${WYOMING_ZEROCONF_IPS:-100.112.105.113}
      # WYOMING_ZEROCONF_NAME: "Mara Wake Word"
    restart: unless-stopped

  piper-ui:
    build:
      context: ./piper_ui
      dockerfile: Dockerfile
    ports:
      - "${PIPER_UI_PORT:-8080}:8080"
    volumes:
      - piper_models:/data/models
      - wakeword_models:/data/wakeword_models
      - mara_logs:/data/logs:ro
    environment:
      MODELS_DIR: /data/models
      WAKE_MODELS_DIR: /data/wakeword_models
      WAKE_LOG_FILE: /data/logs/mara-wakeword.log
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  piper_models:
  wakeword_models:
  mara_logs:
